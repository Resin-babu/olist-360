name: Olist 360 CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: pip install pandas duckdb pytest pytest-cov

    - name: Run tests
      run: pytest tests/test_etl.py -v --cov=src --cov-report=term-missing